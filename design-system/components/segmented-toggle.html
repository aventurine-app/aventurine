<!-- @dsCard group="Components" name="Segmented Toggle" subtitle="Radio-backed option group" -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>Segmented Toggle — Oliv Design System</title>
    <link rel="stylesheet" href="../../static/css/style.css">
    <link rel="stylesheet" href="../../static/css/themes.css">
    <link rel="stylesheet" href="../../static/css/settings.css">
    <link rel="stylesheet" href="../_canvas.css">
</head>
<body>
    <div class="ds-card">
        <div class="ds-card-head">
            <h1 class="ds-card-title">Segmented Toggle</h1>
            <p class="ds-card-note">The <code>.settings-match-toggle</code> pattern — a row of mutually-exclusive
                radios styled as pills. The checked pill fills with a 20% accent tint. Used throughout Preferences
                (density, on/off, number/symbol/date format).</p>
        </div>
        <div class="ds-themes">

            <div class="ds-panel" data-ds-theme="light">
                <div class="ds-panel-label">Light</div>
                <div class="settings-match-toggle">
                    <label class="settings-match-option">
                        <input class="settings-pref-radio" type="radio" name="d-l" checked>
                        <span class="settings-match-label">Comfortable</span>
                    </label>
                    <label class="settings-match-option">
                        <input class="settings-pref-radio" type="radio" name="d-l">
                        <span class="settings-match-label">Compact</span>
                    </label>
                </div>
            </div>

            <div class="ds-panel" data-ds-theme="dark">
                <div class="ds-panel-label">Dark (default)</div>
                <div class="settings-match-toggle">
                    <label class="settings-match-option">
                        <input class="settings-pref-radio" type="radio" name="d-d" checked>
                        <span class="settings-match-label">Comfortable</span>
                    </label>
                    <label class="settings-match-option">
                        <input class="settings-pref-radio" type="radio" name="d-d">
                        <span class="settings-match-label">Compact</span>
                    </label>
                </div>
            </div>

        </div>
    </div>
</body>
</html>
