<!-- @dsCard group="Components" name="Empty & Loading States" subtitle="Empty state + skeletons" -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>Empty &amp; Loading States — Oliv Design System</title>
    <link rel="stylesheet" href="../../static/css/style.css">
    <link rel="stylesheet" href="../../static/css/themes.css">
    <link rel="stylesheet" href="../../static/css/ui.css">
    <link rel="stylesheet" href="../_canvas.css">
</head>
<body>
    <div class="ds-card">
        <div class="ds-card-head">
            <h1 class="ds-card-title">Empty &amp; Loading States</h1>
            <p class="ds-card-note">From <code>ui.css</code>: the rich empty state (icon tile + title + description +
                optional CTA) and the shimmer skeletons shown during a cold fetch.</p>
        </div>
        <div class="ds-themes">

            <div class="ds-panel" data-ds-theme="light">
                <div class="ds-panel-label">Empty state</div>
                <div class="empty-state">
                    <div class="empty-state-icon">
                        <svg viewBox="0 0 24 24" fill="none"><rect x="3" y="5" width="18" height="14" rx="2" stroke="currentColor" stroke-width="1.5"/><path d="M3 9h18" stroke="currentColor" stroke-width="1.5"/></svg>
                    </div>
                    <div class="empty-state-text">
                        <div class="empty-state-title">No transactions yet</div>
                        <div class="empty-state-desc">Import a statement or add one by hand to get started.</div>
                    </div>
                    <a class="empty-state-action empty-state-action-primary" href="#">Import transactions</a>
                </div>
            </div>

            <div class="ds-panel" data-ds-theme="dark">
                <div class="ds-panel-label">Loading skeleton</div>
                <div class="ds-col">
                    <div class="sk-row">
                        <div class="sk-row-text">
                            <div class="skeleton skeleton-line sk-w-50"></div>
                            <div class="skeleton skeleton-line sk-sm sk-w-75"></div>
                        </div>
                        <div class="skeleton skeleton-line sk-lg sk-w-25"></div>
                    </div>
                    <div class="sk-row">
                        <div class="sk-row-text">
                            <div class="skeleton skeleton-line sk-w-60"></div>
                            <div class="skeleton skeleton-line sk-sm sk-w-40"></div>
                        </div>
                        <div class="skeleton skeleton-line sk-lg sk-w-25"></div>
                    </div>
                    <div class="skeleton skeleton-block" style="height:72px;"></div>
                </div>
            </div>

        </div>
    </div>
</body>
</html>
