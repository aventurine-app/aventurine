<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>Oliv | Budget</title>
    <!-- @include head -->
    <link rel="stylesheet" href="/static/css/budget.css">
</head>
<body>
    <!-- @include chrome -->

    <div class="body_container">
        <!-- @include sidebar -->

        <div class="page">

<div class="budget-page">

    <header class="budget-header">
        <div class="budget-header-text">
            <h1 class="page-title">Budget</h1>
            <p class="page-subtitle">
                Give every dollar a job. Set a monthly target per category and
                watch each envelope fill from your actual spending.
            </p>
        </div>
        <div class="budget-toolbar">
            <div class="budget-monthnav">
                <button type="button" class="budget-nav-btn" id="budget-prev" aria-label="Previous month">‹</button>
                <span class="budget-month-label" id="budget-month-label">—</span>
                <button type="button" class="budget-nav-btn" id="budget-next" aria-label="Next month">›</button>
            </div>
            <button type="button" class="budget-copy-btn" id="budget-copy">Copy last month</button>
        </div>
    </header>

    <!-- Zero-based roll-up + allocation meter, rendered by budget.js -->
    <section class="budget-summary-card" id="budget-summary" aria-label="Monthly budget summary"></section>

    <!-- Envelope grids grouped by category type, rendered by budget.js -->
    <div class="budget-groups" id="budget-groups"></div>

</div>

        </div>
    </div>

    <!-- @include scripts -->
    <script src="/static/js/budget.js"></script>
</body>
</html>
