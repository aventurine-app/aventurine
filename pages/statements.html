<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>Oliv | Statements</title>
    <!-- @include head -->
    <link rel="stylesheet" href="/static/css/tables.css">
    <link rel="stylesheet" href="/static/css/statements.css">
</head>
<body>
    <!-- @include chrome -->

    <div class="body_container">
        <!-- @include sidebar -->

        <div class="page">

<div class="db-page stmt-page">
    <!-- Year stepper takes the place of the page title; action buttons stay right. -->
    <div class="db-page-header">
        <div class="stepper stmt-year-stepper" aria-label="Statement year">
            <button type="button" class="stepper-btn" id="stmt-year-prev" aria-label="Previous year" disabled>&#8249;</button>
            <button type="button" class="stepper-label" id="stmt-year-label" aria-live="polite"
                aria-haspopup="menu" title="Choose year">&nbsp;</button>
            <button type="button" class="stepper-btn" id="stmt-year-next" aria-label="Next year" disabled>&#8250;</button>
        </div>
        <!-- One action group per tab; statements.js shows the active tab's. -->
        <div class="db-actions" id="stmt-actions-cashflow">
            <button class="button-primary">Add New Year</button>
        </div>
        <div class="db-actions" id="stmt-actions-balance" hidden>
            <button class="button-secondary">Manage Columns</button>
            <button class="button-primary">Add New Year</button>
        </div>
    </div>

    <!-- Toolbar: tabs left, ⋮ menu right. The stepper has moved to the page
         header above. Controller: statements.js. -->
    <section class="stmt-sheet" id="stmt-sheet" aria-label="Statement">
        <div class="stmt-toolbar">
            <div class="stmt-tabs" role="tablist" aria-label="Statements">
                <button type="button" class="stmt-tab active" id="stmt-tab-cashflow" role="tab"
                    data-tab="cashflow" aria-controls="stmt-panel-cashflow" aria-selected="true">Cash Flow</button>
                <button type="button" class="stmt-tab" id="stmt-tab-balance" role="tab"
                    data-tab="balance" aria-controls="stmt-panel-balance" aria-selected="false" tabindex="-1">Balance Sheet</button>
            </div>
            <div class="stmt-toolbar-right">
                <!-- The wrapper is the positioned anchor the ⋮ dropdown
                     attaches to (openTableMenu appends into the button's
                     parent). -->
                <div class="stmt-menu-wrap">
                    <button class="p-menu-btn" id="stmt-menu-btn" title="Statement options" disabled>⋮</button>
                </div>
            </div>
        </div>

        <div class="stmt-panel" id="stmt-panel-cashflow" role="tabpanel"
            data-panel="cashflow" aria-labelledby="stmt-tab-cashflow">
            <div class="db-tables-container" id="stmt-tables-cashflow"></div>
            <p class="stmt-empty" id="stmt-empty-cashflow" hidden></p>
        </div>

        <div class="stmt-panel" id="stmt-panel-balance" role="tabpanel"
            data-panel="balance" aria-labelledby="stmt-tab-balance" hidden>
            <div class="db-tables-container" id="stmt-tables-balance"></div>
            <p class="stmt-empty" id="stmt-empty-balance" hidden></p>
        </div>
    </section>
</div>

        </div>
    </div>

    <!-- @include scripts -->
    <script src="/static/js/widgets/cellselect.js"></script>
    <script src="/static/js/widgets/tables.js"></script>
    <script src="/static/js/pages/statements.js"></script>
</body>
</html>
