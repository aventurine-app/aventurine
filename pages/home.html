<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>Aventurine | Home</title>
    <!-- @include head -->
    <link rel="stylesheet" href="/static/css/home.css">
</head>
<body>
    <!-- @include chrome -->

    <div class="body_container">
        <!-- @include sidebar -->

        <div class="page">

<div class="home-page">

    <!-- Toolbar: month stepper far left, segmented view tabs far right
         (layout in home.css; the tab control itself is shared with Statements
         via ui.css). Same ARIA tablist pattern as Cash Flow Reports: a
         .home-tab button here + a matching .home-panel[data-panel] below.
         Controller: wireTabs() in home.js. -->
    <div class="home-toolbar">
        <!-- The stepper scopes every card on the Month to Month panel: current
             month by default, arrows walk back to any earlier month; clicking
             the label opens a recent-months picker. wireTabs() hides it while
             Year to Year is active (those cards have their own range pickers). -->
        <div class="stepper" id="home-month" aria-label="Dashboard month">
            <button class="stepper-btn" id="home-month-prev" type="button" aria-label="Previous month">&#8249;</button>
            <button class="stepper-label" id="home-month-label" type="button" aria-live="polite"
                aria-haspopup="menu" title="Choose month">&nbsp;</button>
            <button class="stepper-btn" id="home-month-next" type="button" aria-label="Next month" disabled>&#8250;</button>
        </div>
        <!-- One range picker scoping every card on the Year to Year panel
             (the stepper's counterpart: wireTabs() swaps which one shows). -->
        <div class="range-selector" id="home-range" hidden>
            <button class="range-selector-btn" id="home-range-btn" type="button">This Year</button>
            <div class="range-selector-menu" id="home-range-menu" hidden>
                <button data-range="year"   type="button">This Year</button>
                <button data-range="12mo"   type="button">Last 12 Months</button>
                <button data-range="24mo"   type="button">Last 24 Months</button>
                <button data-range="5yr"    type="button">Last 5 Years</button>
            </div>
        </div>
        <div class="home-tabs" role="tablist" aria-label="Home dashboard views">
            <button type="button" class="home-tab active" id="home-tab-month" role="tab"
                data-tab="month" aria-controls="home-panel-month" aria-selected="true">Month to Month</button>
            <button type="button" class="home-tab" id="home-tab-overtime" role="tab"
                data-tab="overtime" aria-controls="home-panel-overtime" aria-selected="false" tabindex="-1">Year to Year</button>
        </div>
    </div>

    <div class="home-panel" id="home-panel-month" role="tabpanel"
        data-panel="month" aria-labelledby="home-tab-month" tabindex="0">

    <div class="home-grid">

            <div class="home-card">
                <div class="home-card-header">
                    <span class="home-card-title">Monthly Cash Flow<span class="fc-info" tabindex="0" role="note"
                        aria-label="Where the shown month's money went: total income, expenses, savings, and investing from your transactions ledger. Transfers between your own accounts count as none of these."
                        data-tip="Where the shown month's money went: total income, expenses, savings, and investing from your transactions ledger. Transfers between your own accounts count as none of these.">i</span></span>
                </div>
                <div class="chart-area">
                    <div id="mcf-chart"></div>
                </div>
            </div>

            <div class="home-card accounts-card">
                <div class="home-card-header">
                    <span class="home-card-title">Capital Profile</span>
                </div>
                <div class="accounts-body">
                    <div id="accounts-legend" class="accounts-legend"></div>
                    <div id="accounts-pie" class="accounts-pie"></div>
                </div>
            </div>

            <div class="home-card">
                <div class="home-card-header">
                    <span class="home-card-title">Spending<span class="fc-info" tabindex="0" role="note"
                        aria-label="What you've spent in each category in the shown month, from your transactions ledger."
                        data-tip="What you've spent in each category in the shown month, from your transactions ledger.">i</span></span>
                </div>
                <div class="chart-area">
                    <div id="spending-chart"></div>
                </div>
            </div>

    </div>

    </div><!-- /.home-panel -->

    <div class="home-panel" id="home-panel-overtime" role="tabpanel"
        data-panel="overtime" aria-labelledby="home-tab-overtime" tabindex="0" hidden>

    <div class="home-grid">

            <div class="home-card networth-card">
                <div class="home-card-header">
                    <span class="home-card-title">Net Worth<span class="fc-info" tabindex="0" role="note"
                        aria-label="Your Balance Sheet's most recent value for each account, added up — cash, investment, and retirement accounts minus debt. Every account contributes its latest recorded balance, even if from an earlier month."
                        data-tip="Your Balance Sheet's most recent value for each account, added up — cash, investment, and retirement accounts minus debt. Every account contributes its latest recorded balance, even if from an earlier month.">i</span></span>
                </div>
                <div class="networth-summary">
                    <div class="networth-value" id="networth-value">—</div>
                    <div class="networth-change" id="networth-change">—</div>
                </div>
                <div class="chart-area networth-chart-area">
                    <div id="networth-chart"></div>
                </div>
            </div>

            <div class="home-card">
                <div class="home-card-header">
                    <span class="home-card-title">Account Balances</span>
                </div>
                <div id="account-selector" class="account-selector"></div>
                <div class="chart-area">
                    <div id="account-chart"></div>
                </div>
            </div>

            <div class="home-card">
                <div class="home-card-header">
                    <span class="home-card-title">Income & Expenses</span>
                </div>
                <div id="ie-selector" class="account-selector"></div>
                <div class="chart-area">
                    <div id="ie-chart"></div>
                </div>
            </div>

    </div>

    </div><!-- /.home-panel -->

</div>
        </div>
    </div>

    <!-- @include scripts -->
    <script src="/static/js/pages/home.js"></script>
</body>
</html>
